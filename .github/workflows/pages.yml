name: Deploy to GitHub Pages

on:
  # Publish on every push to main
  push:
    branches: [main]
  # Allow a manual run from the Actions tab
  workflow_dispatch:

# Grant the minimum permissions required by the Pages deployment actions
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; do not cancel an in-progress run so
# that a partially-deployed site is never left in a broken state.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Configure Pages and inject the correct base path into the environment
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      # Upload the entire src/ directory as the Pages artifact.
      # No build step is needed because the app is vanilla HTML/CSS/JS.
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: src/

      # Deploy the uploaded artifact to the GitHub Pages CDN
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
